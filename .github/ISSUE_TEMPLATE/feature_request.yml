name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the form below.

  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project is this feature for?
      options:
        - AdHub (main hub)
        - YouTube Downloader
        - Chat Panel
        - PDF Editor
        - PDF Merge
        - Goalix
        - CardHarvest
        - Scribblix
        - PaintNook
        - SliderSnap
        - Spinning Wheel Giveaway
        - Resignation Bets
        - AI Prompting
        - KomoPizza
        - New Project Idea
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is this related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or features?
      placeholder: I've also thought about...

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: Add any mockups, wireframes, or examples from other applications
      placeholder: Drag and drop images here or paste links...

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Would improve my workflow
        - Important for my use case
        - Critical / Blocking
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help implement this feature?
      options:
        - label: I would be willing to submit a PR for this feature
        - label: I can help test this feature
        - label: I can help with documentation

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information about the feature request?
